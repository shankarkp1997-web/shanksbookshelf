  234 <body>
  235
  236 <canvas id="sky"></canvas>
  237
  238 <div class="scene">
  239   <header>
  240     <div class="eyebrow">to-read</div>
  241     <h1>Shankar's <em>Bookshelf</em></h1>
  242     <p class="subtitle">8 books waiting to be opened</p>
  243   </header>
  244
  245   <div class="shelf-wrap">
  246     <div class="books-row" id="books"></div>
  247     <div class="plank">
  248       <div class="plank-edge"></div>
  249       <div class="plank-face"></div>
  250     </div>
  251   </div>
  252
  253   <div class="book-info" id="info">
  254     <div class="info-title" id="info-title"></div>
  255     <div class="info-meta" id="info-meta"></div>
  256   </div>
  257 </div>
  258
  259 <script>
  260 const BOOKS = [
  261   { title: "Think Straight", fullTitle: "Think Straight: Change Your Thoughts, Change Your Life", author: "Darius Foroux", pages: 78 },
  262   { title: "Dopamine Detox", fullTitle: "Dopamine Detox: A Short Guide to Remove Distractions and Train Your Brain to Do Hard Things", author: "Thi
      baut Meurisse", pages: 62 },
  263   { title: "The Gentleman From Peru", fullTitle: "The Gentleman From Peru", author: "André Aciman", pages: 110 },
  264   { title: "H.I.T. Investing", fullTitle: "H.I.T. Investing: Strong Returns Through High-Impact Investing Leveraging Technology", author: "Mahesh J
      oshi", pages: 240 },
  265   { title: "Thinking in Bets", fullTitle: "Thinking in Bets: Making Smarter Decisions When You Don't Have All the Facts", author: "Annie Duke", pag
      es: 288 },
  266   { title: "Runnin' Down a Dream", fullTitle: "Runnin' Down a Dream: How to Thrive in a Career You Actually Love", author: "Bill Gurley", pages: 27
      2 },
  267   { title: "Empire of AI", fullTitle: "Empire of AI: Dreams and Nightmares in Sam Altman's OpenAI", author: "Karen Hao", pages: 496 },
  268   { title: "The Let Them Theory", fullTitle: "The Let Them Theory: A Life-Changing Tool That Millions of People Can't Stop Talking About", author: 
      "Mel Robbins", pages: 311 },
  269 ];
  270
  271 const PALETTE = [
  272   { bg: '#C0392B', accent: '#E74C3C' },
  273   { bg: '#2980B9', accent: '#5DADE2' },
  274   { bg: '#27AE60', accent: '#58D68D' },
  275   { bg: '#D35400', accent: '#E59866' },
  276   { bg: '#8E44AD', accent: '#BB8FCE' },
  277   { bg: '#16A085', accent: '#48C9B0' },
  278   { bg: '#B7950B', accent: '#F4D03F' },
  279   { bg: '#1A5276', accent: '#5499C7' },
  280 ];
  281
  282 // ── Render books ─────────────────────────────────────────────────
  283 const row = document.getElementById('books');
  284 const info = document.getElementById('info');
  285 const infoTitle = document.getElementById('info-title');
  286 const infoMeta = document.getElementById('info-meta');
  287
  288 BOOKS.forEach((book, i) => {
  289   const pal = PALETTE[i % PALETTE.length];
  290   const el = document.createElement('div');
  291   el.className = 'book';
  292   el.style.setProperty('--bg', pal.bg);
  293   el.style.setProperty('--accent', pal.accent);
  294   el.innerHTML = `
  295     <div class="book-body">
  296       <div class="book-stripe"></div>
  297       <span class="book-title">${book.title}</span>
  298       <span class="book-author">${book.author}</span>
  299     </div>
  300     <div class="book-glow"></div>
  301   `;
  302   el.addEventListener('mouseenter', () => {
  303     playNote(i);
  304     infoTitle.textContent = book.fullTitle;
  305     infoMeta.textContent = `${book.author}  ·  ${book.pages} pages`;
  306     info.classList.add('visible');
  307   });
  308   el.addEventListener('mouseleave', () => info.classList.remove('visible'));
  309   row.appendChild(el);
  310 });
  311
  312 // ── Pixel sky ────────────────────────────────────────────────────
  313 const canvas = document.getElementById('sky');
  314 const ctx = canvas.getContext('2d');
  315 const PX = 8;
  316
  317 const CLOUDS = [
  318   { shape: ['000111000000','011111110000','111111111100','111111111111','111111111111','222222222222','022222222220'], x: 120, y: 55, speed: 0.28 }
      ,
  319   { shape: ['00011100','01111110','11111111','11111111','22222222','02222220'], x: 480, y: 90, speed: 0.18 },
  320   { shape: ['0001110000','0111111000','1111111110','1111111111','2222222222'], x: 820, y: 70, speed: 0.22 },
  321   { shape: ['001110','111111','111111','222222'], x: 280, y: 130, speed: 0.14 },
  322   { shape: ['000011100000','001111111000','011111111110','111111111111','222222222222','022222222220'], x: 650, y: 40, speed: 0.32 },
  323   { shape: ['011100','111110','111111','222222'], x: 1050, y: 110, speed: 0.16 },
  324 ];
  325
  326 function resize() { canvas.width = window.innerWidth; canvas.height = window.innerHeight; }
  327 resize();
  328 window.addEventListener('resize', resize);
  329
  330 function drawCloud(c) {
  331   for (let r = 0; r < c.shape.length; r++) {
  332     for (let col = 0; col < c.shape[r].length; col++) {
  333       const ch = c.shape[r][col];
  334       if (ch === '0') continue;
  335       ctx.fillStyle = ch === '1' ? 'rgba(255,255,255,0.92)' : 'rgba(180,210,240,0.55)';
  336       ctx.fillRect(Math.round(c.x + col * PX), Math.round(c.y + r * PX), PX, PX);
  337     }
  338   }
  339 }
  340
  341 (function tick() {
  342   ctx.clearRect(0, 0, canvas.width, canvas.height);
  343   for (const c of CLOUDS) {
  344     drawCloud(c);
  345     c.x -= c.speed;
  346     if (c.x + c.shape[0].length * PX < -PX) c.x = canvas.width + PX;
  347   }
  348   requestAnimationFrame(tick);
  349 })();
  350
  351 // ── Piano ────────────────────────────────────────────────────────
  352 let audioCtx;
  353 const FREQS = [261.63, 293.66, 329.63, 392.00, 440.00, 523.25, 587.33, 659.25];
  354
  355 function playNote(i) {
  356   try {
  357     if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  358     const ac = audioCtx, freq = FREQS[i % FREQS.length], now = ac.currentTime;
  359     const o1 = ac.createOscillator(), o2 = ac.createOscillator();
  360     const f = ac.createBiquadFilter(), g = ac.createGain();
  361     o1.type = 'triangle'; o1.frequency.value = freq;
  362     o2.type = 'sine'; o2.frequency.value = freq * 2.005;
  363     f.type = 'lowpass'; f.frequency.value = 1200;
  364     g.gain.setValueAtTime(0, now);
  365     g.gain.linearRampToValueAtTime(0.12, now + 0.02);
  366     g.gain.exponentialRampToValueAtTime(0.001, now + 1.8);
  367     [o1, o2].forEach(o => { o.connect(f); o.start(now); o.stop(now + 2); });
  368     f.connect(g); g.connect(ac.destination);
  369   } catch(_) {}
  370 }
  371 </script>
